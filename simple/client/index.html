<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CTF</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        /* Hidden flag */
        .hidden-flag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: transparent;
            user-select: text;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔐 Secure Vault</h1>
        <p>Only authorized users can access the secret.</p>
        <button onclick="alert('Access Denied')">Authenticate</button>
    </div>
    <!-- imp -->
    <div class="hidden-flag">CTF{y0u_4r3_4_tru3_1nsp3ct0r}</div> 

</body>
</html>
